name: Documentation fix
description: Report inaccurate or confusing docs.
title: "[Docs] "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link to the README, docs page, or example file.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is wrong or unclear?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected wording or behavior
      description: Suggest the corrected text if possible.

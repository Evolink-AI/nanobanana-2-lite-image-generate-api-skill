name: API bug
description: Report an EvoLink API integration or task lifecycle issue.
title: "[API] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: input
    id: task-id
    attributes:
      label: Task ID
      description: Include the EvoLink task ID if available. Do not include API keys.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the command or code path used.
      placeholder: npx -y evolink-nanobanana-2-lite@latest "prompt"
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste sanitized output, status codes, and error bodies.
    validations:
      required: true
